<!DOCTYPE html>
<html>

<head>
    <title>Add Job</title>
</head>

<body>

<h1>Create Job Description</h1>

<form method="POST">

<label>Job Title</label>

<input
type="text"
name="title"
required>

<br><br>

<label>Company</label>

<input
type="text"
name="company"
required>

<br><br>

<label>Required Skills</label>

<textarea
name="skills"
rows="8"
cols="60"
placeholder="Python, Flask, SQL"
required></textarea>

<br><br>

<button type="submit">
Save Job
</button>

</form>

</body>

</html>
