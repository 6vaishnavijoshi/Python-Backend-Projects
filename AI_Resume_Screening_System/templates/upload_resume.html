<!DOCTYPE html>
<html>

<head>
    <title>Upload Resume</title>
    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<div class="container">

    <h1>Upload Resume</h1>

    <form method="POST" enctype="multipart/form-data">

        <input
            type="file"
            name="resume"
            accept=".pdf"
            required>

        <br><br>

        <button type="submit">
            Upload Resume
        </button>

    </form>

    <br>

    <a href="{{ url_for('dashboard') }}">
        Back to Dashboard
    </a>

</div>

</body>
</html>
