<!DOCTYPE html>
<html>
<head>
    <title>Upload Resume</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <a href="/">Home</a>
    <a href="/dashboard">Dashboard</a>
    <a href="/logout">Logout</a>
</nav>

<div class="container">

<h2>Upload Resume</h2>

<form method="POST" enctype="multipart/form-data">

    <input
        type="file"
        name="resume"
        accept=".pdf,.doc,.docx"
        required>

    <br><br>

    <button type="submit">
        Upload Resume
    </button>

</form>

</div>

</body>
</html>
