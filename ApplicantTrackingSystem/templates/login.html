<!DOCTYPE html>
<html>
<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<nav>

<a href="/">Home</a>
<a href="/login">Login</a>
<a href="/register">Register</a>

</nav>

<div class="container">

<h1>Login</h1>

<form method="POST">

    <input
        type="email"
        name="email"
        placeholder="Email"
        required>

    <input
        type="password"
        name="password"
        placeholder="Password"
        required>

    <button type="submit">
        Login
    </button>

</form>
</div>

</body>
</html>
