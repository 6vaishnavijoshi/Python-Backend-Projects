<!DOCTYPE html>
<html>

<head>

    <title>Applicants</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Applicants for {{ job.title }}</h1>

{% if applicants %}

    {% for user in applicants %}

        <div class="card">

            <h2>{{ user.name }}</h2>

            <p>Email: {{ user.email }}</p>

        </div>

        <br>

    {% endfor %}

{% else %}

<h3>No applicants yet.</h3>

{% endif %}

<br>

<a href="{{ url_for('jobs') }}">

<button>Back to Jobs</button>

</a>

</div>

</body>

</html>
